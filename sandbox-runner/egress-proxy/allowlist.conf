# ECA-64 egress allowlist — the ONLY hosts the agent container may reach.
# Extended POSIX regex, one per line, matched (case-insensitive) against the
# destination host. Anchored with ^...$ so `evil-github.com.attacker.net` and
# `notgithub.com` do NOT match. Everything not listed is default-denied.

# --- GitHub (clone/fetch over HTTPS) ---
^github\.com$
^api\.github\.com$
^codeload\.github\.com$
# raw + release asset CDNs (subdomains of githubusercontent.com)
(^|\.)githubusercontent\.com$
# large-file / upload paths (git-lfs, release uploads) — conditional but common
^github-cloud\.s3\.amazonaws\.com$
^uploads\.github\.com$

# --- Amazon Bedrock (the model backend; region-agnostic) ---
^bedrock-runtime\.[a-z0-9-]+\.amazonaws\.com$
^bedrock\.[a-z0-9-]+\.amazonaws\.com$

# NOTE: DNS (udp/53) is served by the docker embedded resolver on the internal
# network itself, so it needs no allowlist entry here. NATS/api.anthropic.com are
# deliberately ABSENT — the runner has no in-container coordination and disables
# WebFetch/WebSearch, so the api.anthropic.com preflight never fires.
