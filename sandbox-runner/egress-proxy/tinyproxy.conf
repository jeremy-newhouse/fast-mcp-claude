# ECA-64 egress proxy config — default-DENY host allowlist.
#
# Filtering model: `FilterDefaultDeny Yes` means ONLY hosts matching a regex in
# allowlist.conf are permitted; every other destination is refused. For HTTPS
# (all of GitHub + Bedrock) the client issues `CONNECT host:443`, so the proxy
# filters on the CONNECT **host** (TLS hides the path — see README "residual").

User tinyproxy
Group tinyproxy

# Listen on all interfaces INSIDE the container; network isolation is enforced by
# the internal docker network (only the agent container can reach us), not by IP.
Port 8888

Timeout 600
MaxClients 100
StartServers 2

# Log to stdout (no LogFile + `-d`) at a level that records each allow/deny, so
# the smoke egress proof can grep the decisions.
LogLevel Connect

# Client ACL: the proxy is only reachable on the internal net, so allow all
# source IPs there. (Do NOT expose this proxy on a routable network.)
Allow 0.0.0.0/0

# --- The allowlist (default-deny) ---------------------------------------------
# Extended POSIX regex, case-insensitive, matched against the destination HOST
# (FilterURLs off => host match, which is all we can see for HTTPS CONNECT).
Filter "/etc/tinyproxy/allowlist.conf"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off
FilterURLs Off

# Restrict HTTPS tunneling (CONNECT) to 443 only. git-over-https and the Bedrock
# runtime endpoint are both 443; nothing here needs any other CONNECT port.
ConnectPort 443

# No upstream proxy, no reverse mode, no viaproxy header leakage of internals.
DisableViaHeader Yes
